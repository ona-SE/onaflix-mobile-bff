tasks:
  install-deps:
    name: Install dependencies
    description: Install npm packages.
    command: |
      npm install
    triggeredBy:
      - postDevcontainerStart

services:
  redis:
    name: Redis
    description: Redis cache for the BFF service.
    commands:
      start: |
        docker rm -f redis 2>/dev/null || true
        docker run --rm --name redis -p 6379:6379 redis:7-alpine
      ready: |
        docker exec redis redis-cli ping | grep -q PONG
      stop: |
        docker rm -f redis 2>/dev/null || true
    triggeredBy:
      - postDevcontainerStart

  dev-server:
    name: Dev Server
    description: Express dev server with ts-node.
    commands:
      start: |
        npm run dev
      ready: |
        curl -f http://localhost:3005/health
    triggeredBy:
      - postDevcontainerStart
